<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumiplan</title>

<style>
body {
  margin: 0;
  background: black;
  color: orange;
  font-family: monospace;
  overflow: hidden;
}

/* Heure */
#time {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 20px;
}

/* Lignes en haut */
#lineButtons {
  position: absolute;
  top: 10px;
  left: 10px;
}

button {
  background: orange;
  border: none;
  margin: 3px;
  padding: 5px 10px;
  cursor: pointer;
}

/* Affichage ligne */
#display {
  text-align: center;
  margin-top: 100px;
}

/* Arrêts */
#stops {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

.stop {
  text-align: center;
}

.dot {
  width: 10px;
  height: 10px;
  background: orange;
  border-radius: 50%;
  margin: auto;
}

/* Texte bas */
#scrollText {
  position: absolute;
  bottom: 20px;
  width: 100%;
  white-space: nowrap;
  overflow: hidden;
}

#scrollText span {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 10s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* Bouton réglage */
#settingsBtn {
  position: absolute;
  bottom: 10px;
  left: 10px;
}

/* Menu réglage */
#settings {
  display: none;
  position: absolute;
  background: black;
  color: white;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding: 20px;
}
</style>
</head>

<body>

<div id="time"></div>

<div id="lineButtons"></div>

<div id="display">
  <div id="stops"></div>
</div>

<div id="scrollText"><span id="scrollContent"></span></div>

<button id="settingsBtn">⚙️</button>

<div id="settings">
  <h2>Créer une ligne</h2>
  <input id="lineName" placeholder="Nom ligne"><br><br>
  <input id="stopName" placeholder="Nom arrêt">
  <button onclick="addStop()">Ajouter arrêt</button><br><br>
  <button onclick="saveLine()">Sauvegarder ligne</button>
  <button onclick="closeSettings()">Fermer</button>
</div>

<script>
let lines = JSON.parse(localStorage.getItem("lines")) || [];
let currentLine = null;
let stopsTemp = [];

/* Heure */
setInterval(() => {
  let now = new Date();
  document.getElementById("time").innerText =
    now.getHours().toString().padStart(2,"0") + ":" +
    now.getMinutes().toString().padStart(2,"0");
}, 1000);

/* GPS */
let userPos = null;

navigator.geolocation.watchPosition((pos) => {
  userPos = pos.coords;
  checkStops();
});

/* Ajouter arrêt */
function addStop() {
  if (!userPos) return alert("Active le GPS !");
  let name = document.getElementById("stopName").value;
  stopsTemp.push({
    name,
    lat: userPos.latitude,
    lon: userPos.longitude
  });
  alert("Arrêt ajouté !");
}

/* Sauvegarder ligne */
function saveLine() {
  let name = document.getElementById("lineName").value;
  lines.push({ name, stops: stopsTemp });
  localStorage.setItem("lines", JSON.stringify(lines));
  stopsTemp = [];
  loadButtons();
}

/* Boutons lignes */
function loadButtons() {
  let div = document.getElementById("lineButtons");
  div.innerHTML = "";
  lines.forEach((l, i) => {
    let btn = document.createElement("button");
    btn.innerText = l.name;
    btn.onclick = () => selectLine(i);
    div.appendChild(btn);
  });
}
loadButtons();

/* Sélection ligne */
function selectLine(i) {
  currentLine = lines[i];
  displayLine();
}

/* Affichage ligne */
function displayLine() {
  let stopsDiv = document.getElementById("stops");
  stopsDiv.innerHTML = "";

  currentLine.stops.forEach(s => {
    let div = document.createElement("div");
    div.className = "stop";
    div.innerHTML = `<div class="dot"></div><div>${s.name}</div>`;
    stopsDiv.appendChild(div);
  });
}

/* Calcul distance */
function distance(a,b) {
  return Math.sqrt(
    (a.lat - b.latitude)**2 +
    (a.lon - b.longitude)**2
  );
}

/* Vérifier arrêt */
let currentIndex = 0;

function checkStops() {
  if (!currentLine || !userPos) return;

  let stop = currentLine.stops[currentIndex];
  let d = distance(stop, userPos);

  if (d < 0.0005) {
    document.getElementById("scrollContent").innerText =
      "Arrêt : " + stop.name;
  } else {
    let next = currentLine.stops[currentIndex+1];
    if (next) {
      document.getElementById("scrollContent").innerText =
        "Prochain arrêt : " + next.name;
      if (d > 0.001) currentIndex++;
    }
  }
}

/* Settings */
document.getElementById("settingsBtn").onclick = () => {
  document.getElementById("settings").style.display = "block";
}

function closeSettings() {
  document.getElementById("settings").style.display = "none";
}
</script>

</body>
</html>
